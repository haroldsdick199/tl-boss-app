<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TL Design Team</title>
</head>
<body>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;width:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0a0a0a;color:#fff;font-size:13.5px;line-height:1.5}

/* ── TAB BAR ──────────────────────────────── */
.tab-bar{display:flex;align-items:stretch;border-bottom:1px solid #1a1a1a;background:#0a0a0a;position:sticky;top:0;z-index:30}
.tab{padding:13px 22px;font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:#525252;transition:all .15s}
.tab.tab-active{color:#a78bfa;border-bottom-color:#7c3aed}
.tab:hover:not(.tab-active){color:#a1a1aa}

/* connection status pill */
.conn-pill{display:flex;align-items:center;gap:7px;margin-left:auto;padding:0 14px;font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
.conn-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.conn-pill.live    {color:#4ade80}.conn-pill.live    .conn-dot{background:#16a34a}
.conn-pill.sync    {color:#fbbf24}.conn-pill.sync    .conn-dot{background:#d97706;animation:pulse 1s ease-in-out infinite}
.conn-pill.offline {color:#f87171}.conn-pill.offline .conn-dot{background:#dc2626;animation:pulse 1.4s ease-in-out infinite}
.tab-gear{background:none;border:none;color:#525252;font-size:16px;padding:0 14px;cursor:pointer}
.tab-gear:hover{color:#a1a1aa}

/* offline banner */
#offline-banner{display:none;align-items:center;gap:10px;background:rgba(220,38,38,.12);border-bottom:1px solid rgba(220,38,38,.35);color:#f87171;font-size:11.5px;font-weight:700;padding:9px 20px;letter-spacing:.02em}
#offline-banner .ob-msg{flex:1;line-height:1.4}
#offline-banner .ob-sub{display:block;color:#b45050;font-weight:600;font-size:10px}
#offline-banner button{background:rgba(220,38,38,.18);border:1px solid rgba(220,38,38,.4);border-radius:6px;color:#fca5a5;font-size:10px;font-weight:700;padding:5px 12px;cursor:pointer;letter-spacing:.05em}
#offline-banner button:hover{background:rgba(220,38,38,.3)}

/* ── TOP SCORE SECTION ─────────────────────────── */
.score-section{
  display:flex;flex-direction:column;align-items:center;
  padding:40px 24px 36px;
  border-bottom:1px solid #1a1a1a;
}
.brand{font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#a1a1aa;margin-bottom:28px}
.brand span{color:#7c3aed}

.ring-wrap{position:relative;width:210px;height:210px;margin-bottom:22px}
.ring-wrap svg{transform:rotate(-90deg);width:100%;height:100%}
.ring-track{fill:none;stroke:#1a1a1a;stroke-width:16;stroke-linecap:round}
.ring-fill{fill:none;stroke-width:16;stroke-linecap:round;stroke-dasharray:597;stroke-dashoffset:597}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-num{font-size:58px;font-weight:800;letter-spacing:-3px;line-height:1}
.score-sub{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;margin-top:4px;color:#737373}

.status-pill{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:9px 22px;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:22px}
.pulse-dot{width:7px;height:7px;border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

.kpis{display:flex;gap:32px;flex-wrap:wrap;justify-content:center}
.kpi{text-align:center}
.kpi-n{font-size:22px;font-weight:800;line-height:1;margin-bottom:3px}
.kpi-l{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#a1a1aa}
.kpi-sep{width:1px;background:#1a1a1a;align-self:center;height:28px}
.kpi-n.red{color:#f87171}.kpi-n.purple{color:#a78bfa}.kpi-n.amber{color:#fbbf24}

/* ── PROJECTS SECTION ──────────────────────────── */
.projects-section{padding:28px 24px 40px;max-width:740px;margin:0 auto;width:100%}
.section-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#a1a1aa;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:#1a1a1a}

.proj-row{background:#111;border:1px solid #1f1f1f;border-radius:10px;padding:14px 16px;margin-bottom:8px;transition:border-color .15s;cursor:pointer}
.proj-row:hover{border-color:#525252}
.proj-row.over{border-left:2px solid #dc2626}
.proj-row.risk{border-left:2px solid #d97706}
.proj-row.ok  {border-left:2px solid #16a34a}
.proj-row.upcoming-row{border-left:2px solid #3f3f46;opacity:.7;cursor:default}

/* phase group subheaders */
.phase-group-hdr{display:flex;align-items:center;gap:9px;margin:18px 0 10px}
.phase-group-hdr:first-child{margin-top:2px}
.phase-group-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.phase-group-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.phase-group-sub{font-size:10px;font-weight:600;color:#525252;letter-spacing:.02em}
.phase-group-count{font-size:9px;font-weight:700;color:#a1a1aa;background:#1a1a1a;border:1px solid #262626;border-radius:999px;padding:1px 8px}
.phase-group-hdr .line{flex:1;height:1px;background:#1a1a1a}
.phase-group-hdr.p1 .phase-group-title{color:#a78bfa}
.phase-group-hdr.p1 .phase-group-dot{background:#8b5cf6}
.phase-group-hdr.p2 .phase-group-title{color:#67e8f9}
.phase-group-hdr.p2 .phase-group-dot{background:#0891b2}

.proj-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.proj-name{font-weight:700;font-size:13px;letter-spacing:-.2px}
.proj-badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

.pbadge{border-radius:999px;font-size:9.5px;font-weight:700;padding:2px 9px;letter-spacing:.03em}
.pbadge.over    {background:rgba(220,38,38,.15);color:#f87171;border:1px solid rgba(220,38,38,.25)}
.pbadge.ontime  {background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
.pbadge.design  {background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.25)}
.pbadge.drafting{background:rgba(8,145,178,.15);color:#67e8f9;border:1px solid rgba(8,145,178,.3)}
.pbadge.quoting {background:rgba(217,119,6,.15);color:#fbbf24;border:1px solid rgba(217,119,6,.25)}
.pbadge.waiting {background:rgba(217,119,6,.12);color:#fbbf24;border:1px dashed rgba(217,119,6,.35)}
.pbadge.cr      {background:rgba(220,38,38,.2);color:#fca5a5;border:1px solid rgba(220,38,38,.3)}
.pbadge.neutral {background:#1a1a1a;color:#a1a1aa;border:1px solid #222}
.pbadge.done-badge{background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.2)}

/* timeline bar */
.tbar-track{height:6px;background:#1a1a1a;border-radius:999px;overflow:hidden;position:relative;margin-bottom:6px}
.tbar-design  {position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,#7c3aed,#8b5cf6);border-radius:999px}
.tbar-drafting{position:absolute;top:0;height:100%;background:linear-gradient(90deg,#0e7490,#0891b2);border-radius:999px}
.tbar-quote   {position:absolute;top:0;height:100%;background:linear-gradient(90deg,#b45309,#d97706);border-radius:999px}
.tbar-over    {position:absolute;top:0;height:100%;background:linear-gradient(90deg,#dc2626,#f87171);border-radius:999px}
.tbar-today   {position:absolute;top:0;bottom:0;width:2px;background:#fff;opacity:.6;border-radius:999px;z-index:2}

.proj-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.proj-day-info{font-size:10px;color:#737373;font-weight:600}

/* state colors applied to body */
body.great .ring-fill{stroke:#7c3aed}
body.great .score-num{color:#a78bfa}
body.great .score-sub{color:#7c3aed}
body.great .status-pill{background:rgba(124,58,237,.15);color:#a78bfa;border:1px solid rgba(124,58,237,.3)}
body.great .pulse-dot{background:#7c3aed}
body.good  .ring-fill{stroke:#16a34a}
body.good  .score-num{color:#4ade80}
body.good  .score-sub{color:#16a34a}
body.good  .status-pill{background:rgba(22,163,74,.15);color:#4ade80;border:1px solid rgba(22,163,74,.3)}
body.good  .pulse-dot{background:#16a34a}
body.fair  .ring-fill{stroke:#d97706}
body.fair  .score-num{color:#fbbf24}
body.fair  .score-sub{color:#d97706}
body.fair  .status-pill{background:rgba(217,119,6,.15);color:#fbbf24;border:1px solid rgba(217,119,6,.3)}
body.fair  .pulse-dot{background:#d97706}
body.behind .ring-fill{stroke:#dc2626}
body.behind .score-num{color:#f87171}
body.behind .score-sub{color:#dc2626}
body.behind .status-pill{background:rgba(220,38,38,.15);color:#f87171;border:1px solid rgba(220,38,38,.3)}
body.behind .pulse-dot{background:#dc2626}

.spin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 0}
.spin{width:28px;height:28px;border:2px solid #1f1f1f;border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.date-line{font-size:10px;color:#525252;text-align:center;padding:0 0 20px;letter-spacing:.06em}
#date-line-side{display:none;padding-top:24px}

/* LEGEND */
.bar-legend{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:18px;padding:12px 16px;background:#111;border:1px solid #1f1f1f;border-radius:8px}
.leg-item{display:flex;align-items:center;gap:8px}
.leg-swatch{width:28px;height:5px;border-radius:999px;flex-shrink:0}
.leg-swatch.design  {background:linear-gradient(90deg,#7c3aed,#8b5cf6)}
.leg-swatch.drafting{background:linear-gradient(90deg,#0e7490,#0891b2)}
.leg-swatch.quote   {background:linear-gradient(90deg,#b45309,#d97706)}
.leg-swatch.over    {background:linear-gradient(90deg,#dc2626,#f87171)}
.leg-text{font-size:10.5px;font-weight:600;color:#a1a1aa;letter-spacing:.03em}
.leg-text span{color:#737373;font-weight:500;margin-left:3px}

/* PROJECT SCORE BADGE */
.proj-score{display:flex;flex-direction:column;align-items:center;justify-content:center;width:54px;height:54px;border-radius:10px;flex-shrink:0;border:1px solid;background:#0a0a0a}
.proj-score .ps-num{font-size:20px;font-weight:800;line-height:1;letter-spacing:-1px}
.proj-score .ps-lbl{font-size:8px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-top:2px;opacity:.7}
.proj-score.great {border-color:rgba(124,58,237,.5);color:#a78bfa;box-shadow:0 0 12px rgba(124,58,237,.15)}
.proj-score.good  {border-color:rgba(22,163,74,.5); color:#4ade80;box-shadow:0 0 12px rgba(22,163,74,.15)}
.proj-score.fair  {border-color:rgba(217,119,6,.5); color:#fbbf24;box-shadow:0 0 12px rgba(217,119,6,.15)}
.proj-score.poor  {border-color:rgba(220,38,38,.5); color:#f87171;box-shadow:0 0 12px rgba(220,38,38,.15)}
.proj-score.done-score{border-color:rgba(74,222,128,.3);color:#4ade80;box-shadow:none}

/* AVG BANNER */
.avg-banner{display:flex;align-items:center;justify-content:space-between;background:#111;border:1px solid #1f1f1f;border-radius:8px;padding:12px 16px;margin-bottom:14px;flex-wrap:wrap;gap:12px}
.avg-stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.avg-num{font-size:22px;font-weight:800;line-height:1;letter-spacing:-1px}
.avg-lbl{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#737373}
.avg-sep{width:1px;height:32px;background:#1f1f1f}
.avg-note{font-size:10.5px;color:#737373;line-height:1.5}

/* MONTHLY COMPLETIONS */
.monthly-wrap{margin-top:24px;width:100%;max-width:340px;text-align:left}
.monthly-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.monthly-month-label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#4ade80}
.monthly-header::before,.monthly-header::after{content:'';flex:1;height:1px;background:#1a1a1a}
.monthly-header::before{flex:0 0 20px}
.monthly-items{display:flex;flex-direction:column;gap:5px}
.monthly-item{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:#111;border:1px solid #1f1f1f;border-radius:7px}
.monthly-item-name{font-size:11px;font-weight:700;color:#e4e4e7;letter-spacing:-.1px}
.monthly-item-right{display:flex;align-items:center;gap:8px}
.monthly-item-date{font-size:9.5px;color:#737373;font-weight:600}
.monthly-done-chip{font-size:8.5px;font-weight:700;letter-spacing:.05em;background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.2);border-radius:999px;padding:2px 8px}
.monthly-empty{font-size:11px;color:#525252;padding:6px 0}

/* COMPLETED / UPCOMING SECTIONS */
.completed-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;margin-top:8px}
.completed-toggle .section-label{margin-bottom:0;color:#525252}
.toggle-arrow{font-size:10px;color:#525252;transition:transform .2s;flex-shrink:0}
.toggle-arrow.open{transform:rotate(90deg)}
.completed-list{margin-top:10px;display:none}
.completed-list.open{display:block}
.proj-row.done-row{opacity:.55;border-left:2px solid #3f3f46}
.proj-row.done-row:hover{opacity:.75;border-color:#737373}

/* ── HISTORY VIEW ─────────────────────────── */
#history-view{max-width:780px;margin:0 auto;width:100%;padding:28px 24px 60px}
.hist-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px}
.hist-title{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#525252}
.hist-month-picker{display:flex;align-items:center;gap:12px}
.hist-month-label{font-size:16px;font-weight:800;letter-spacing:-.4px;min-width:130px;text-align:center;color:#e4e4e7}
.hist-nav-btn{background:none;border:1px solid #2a2a2a;border-radius:7px;color:#a1a1aa;font-size:14px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.hist-nav-btn:hover:not(:disabled){border-color:#525252;color:#fff}
.hist-nav-btn:disabled{opacity:.2;cursor:default}
.month-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:18px;scrollbar-width:thin}
.month-chip{flex-shrink:0;background:#111;border:1px solid #2a2a2a;border-radius:999px;color:#737373;font-size:10px;font-weight:700;letter-spacing:.05em;padding:5px 14px;cursor:pointer;transition:all .15s;white-space:nowrap}
.month-chip:hover{border-color:#525252;color:#a1a1aa}
.month-chip.active{border-color:#7c3aed;color:#a78bfa;background:rgba(124,58,237,.1)}
.month-chip .mc-live{display:inline-block;width:5px;height:5px;border-radius:50%;background:#16a34a;margin-right:6px;vertical-align:1px;animation:pulse 2s ease-in-out infinite}

/* trend section */
.trend-wrap{background:#111;border:1px solid #1f1f1f;border-radius:10px;padding:16px 20px;margin-bottom:20px}
.trend-title{font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#525252;margin-bottom:12px}
.delta-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.delta-chip{display:flex;align-items:center;gap:6px;background:#0a0a0a;border:1px solid #1f1f1f;border-radius:8px;padding:6px 12px}
.delta-chip .dc-lbl{font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#737373}
.delta-chip .dc-val{font-size:13px;font-weight:800}
.dc-up{color:#4ade80}.dc-down{color:#f87171}.dc-flat{color:#a1a1aa}

.hist-score-section{display:flex;align-items:center;gap:20px;margin-bottom:20px;padding:20px;background:#111;border:1px solid #1f1f1f;border-radius:12px;flex-wrap:wrap}
.hist-ring-wrap{position:relative;width:100px;height:100px;flex-shrink:0}
.hist-ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hist-score-num{font-size:28px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.hist-score-lbl{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#737373;margin-top:2px}
.hist-kpis{display:flex;gap:16px;flex:1;flex-wrap:wrap;align-items:center}
.hist-kpi{text-align:center;min-width:52px}
.hist-kpi-n{font-size:20px;font-weight:800;line-height:1;margin-bottom:3px}
.hist-kpi-l{font-size:8.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#737373}
.hist-kpi-sep{width:1px;background:#1f1f1f;height:24px}
.hist-section-lbl{font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#525252;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.hist-section-lbl::after{content:'';flex:1;height:1px;background:#1a1a1a}
.hist-chart-wrap{background:#111;border:1px solid #1f1f1f;border-radius:10px;padding:16px 20px;margin-bottom:20px;position:relative}
.hist-lock-badge{display:inline-flex;align-items:center;gap:5px;font-size:8.5px;font-weight:700;letter-spacing:.06em;background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.2);border-radius:999px;padding:3px 10px;text-transform:uppercase;flex-shrink:0}
.hist-live-badge{display:inline-flex;align-items:center;gap:5px;font-size:8.5px;font-weight:700;letter-spacing:.06em;background:rgba(217,119,6,.1);color:#fbbf24;border:1px solid rgba(217,119,6,.25);border-radius:999px;padding:3px 10px;text-transform:uppercase;flex-shrink:0}
.hist-completed-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#111;border:1px solid #1f1f1f;border-radius:8px;margin-bottom:6px}
.hist-completed-name{font-size:11.5px;font-weight:700;color:#e4e4e7}
.hist-proj-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 14px;background:#111;border:1px solid #1f1f1f;border-radius:8px;margin-bottom:6px;flex-wrap:wrap}
.hist-proj-name{font-size:12px;font-weight:700;color:#e4e4e7;min-width:110px}
.hist-proj-phases{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.hchip{font-size:9.5px;font-weight:700;padding:2px 9px;border-radius:999px;white-space:nowrap}
.hist-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;gap:12px}
.hist-empty-icon{font-size:40px;opacity:.15}
.hist-empty-text{font-size:12.5px;color:#525252;line-height:1.6;max-width:300px}

/* ── DETAIL VIEW ──────────────────────────── */
#hub-view{display:block}
#detail-view{display:none}
.detail-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:20px 24px;border-bottom:1px solid #1a1a1a;flex-wrap:wrap}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:1px solid #2a2a2a;border-radius:8px;color:#a1a1aa;font-size:11px;font-weight:700;letter-spacing:.06em;padding:8px 16px;cursor:pointer;transition:all .15s}
.back-btn:hover{border-color:#525252;color:#e4e4e7}
.detail-name{font-size:20px;font-weight:800;letter-spacing:-.6px;color:#fff;flex:1;text-align:center}
.notion-link{font-size:10px;font-weight:700;letter-spacing:.06em;color:#525252;text-decoration:none;padding:8px 14px;border:1px solid #2a2a2a;border-radius:8px;white-space:nowrap;cursor:pointer;background:none}
.notion-link:hover{color:#a1a1aa;border-color:#525252}
.detail-body{padding:24px;max-width:740px;margin:0 auto;width:100%}
.dstat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:24px}
.dstat{background:#111;border:1px solid #1f1f1f;border-radius:10px;padding:14px 16px;text-align:center}
.dstat-n{font-size:22px;font-weight:800;line-height:1;margin-bottom:5px}
.dstat-l{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#737373}
.d-section-lbl{font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#525252;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.d-section-lbl::after{content:'';flex:1;height:1px;background:#1a1a1a}
.phase-detail-row{margin-bottom:12px}

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════════════════════
// Standard phase durations (working days). Changed 2026-07: 35/14/10 → 40/15/15.
const D_DESIGN = 40, D_DRAW = 15, D_QUOTE = 15, D_STD = D_DESIGN + D_DRAW + D_QUOTE;

const PROJECTS_DB_ID = '3092b8ff-1ebd-8199-bf94-ca7053d4d0a4';
const CACHE_KEY  = 'tl-cache-v10';
const OLD_CACHE_KEYS = ['tl-boss-v9'];

// Client-deliverable milestones, in fixed order. The scheduling chat writes
// these date properties onto each Projects row when a schedule is confirmed.
// A Phase-2 "Completion Date" milestone can be appended here later.
const MILESTONE_DEFS = [
  { key: 'Design Direction Date', label: 'Design Direction', short: 'Design Dir.' },
  { key: '3D Model Date',         label: '3D Model',         short: '3D Model'   },
  { key: 'Renderings Date',       label: 'Renderings',       short: 'Renderings' },
  { key: 'Pricing Date',          label: 'Pricing',          short: 'Pricing'    },
  { key: 'Drawings Date',         label: 'Drawings',         short: 'Drawings'   }
];
const REFRESH_EVERY_MS = 10 * 60 * 1000;   // background auto-refresh
const DONE_WINDOW_DAYS = 75;               // how long completed projects stay listed

// Chart palette — CVD-validated (violet / cyan / amber, worst pair ΔE 42)
const C_DESIGN = '#8b5cf6', C_DRAFT = '#0891b2', C_QUOTE = '#d97706', C_OVER = '#ef4444';
const SURFACE  = '#111111';

const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_FULL  = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const TODAY = (function(){ const d = new Date(); d.setHours(0,0,0,0); return d; })();
const TODAY_STR = TODAY.getFullYear() + '-' + String(TODAY.getMonth()+1).padStart(2,'0') + '-' + String(TODAY.getDate()).padStart(2,'0');

// ═══════════════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════════════
let PROJECTS   = [];        // loaded dynamically from Notion (or cache)
let _lastSync  = null;      // Date of last successful Notion sync
let _refreshing = false;
let _currentTab = 'hub';

// ═══════════════════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════════════════
const daysBetween = (s, e) => Math.round((e - new Date(s + 'T00:00:00')) / 86400000);
const sleep = ms => new Promise(r => setTimeout(r, ms));
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// Count Mon–Fri days between two date strings (end-exclusive, matches Notion formula)
function workingDays(startStr, endStr){
  let count = 0;
  const end = new Date(endStr + 'T00:00:00');
  let d = new Date(startStr + 'T00:00:00');
  while(d < end){ const dow = d.getDay(); if(dow !== 0 && dow !== 6) count++; d.setDate(d.getDate()+1); }
  return count;
}

function fmtDate(str){
  if(!str) return '—';
  const d = new Date(str.substring(0,10) + 'T00:00:00');
  return MONTHS_SHORT[d.getMonth()] + ' ' + d.getDate();
}
function fmtTime(d){
  if(!d) return '';
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function urlToId(url){
  const hex = (url||'').replace(/.*\/p\//,'').replace(/-/g,'').split('?')[0];
  if(hex.length !== 32) return null;
  return `${hex.slice(0,8)}-${hex.slice(8,12)}-${hex.slice(12,16)}-${hex.slice(16,20)}-${hex.slice(20)}`;
}

// ═══════════════════════════════════════════════════════════════════════════
//  CONNECTION STATUS UI
// ═══════════════════════════════════════════════════════════════════════════
function setConn(state, detail){
  const pill = document.getElementById('conn-pill');
  const text = document.getElementById('conn-text');
  const banner = document.getElementById('offline-banner');
  pill.style.display = 'flex';
  pill.className = 'conn-pill ' + state;
  if(state === 'live'){
    text.textContent = 'Live · synced ' + fmtTime(_lastSync);
    banner.style.display = 'none';
  } else if(state === 'sync'){
    text.textContent = 'Syncing…';
    banner.style.display = 'none';
  } else { // offline
    text.textContent = 'Not connected';
    banner.style.display = 'flex';
    const cachedNote = _lastSync ? '' : (loadCache() ? 'Showing cached data from ' + new Date(loadCache().ts).toLocaleString() + '. ' : 'No data available. ');
    document.getElementById('ob-detail').textContent = cachedNote + (detail || '');
  }
  const sl = document.getElementById('sync-line');
  if(sl) sl.textContent = state === 'live' ? 'Data synced from Notion at ' + fmtTime(_lastSync)
       : state === 'offline' && loadCache() ? 'Showing cached data — not connected'
       : '';
}

// ═══════════════════════════════════════════════════════════════════════════
//  DATA LAYER — cache + Notion
// ═══════════════════════════════════════════════════════════════════════════
function loadCache(){
  try{ return JSON.parse(localStorage.getItem(CACHE_KEY) || 'null'); }catch(e){ return null; }
}
function saveCache(){
  try{ localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), projects: PROJECTS })); }catch(e){}
}

// Completion date for a done project: planned end if already past, else the
// last-edited date (≈ when it was marked done in Notion).
function completionDate(end, lastEdited){
  if(end && end <= TODAY_STR) return end;
  const le = (lastEdited||'').substring(0,10);
  if(le && le <= TODAY_STR) return le;
  return end || TODAY_STR;
}

// Map a parsed Notion page (from notion-query-db) → project object
function mapProject(row){
  const props = row.props || {};
  const status = props['Status'] || '';
  const stage  = props['Stage'] || '';   // "Phase 1 - Design" | "Phase 2 - Execution" | "Complete" | ""
  const start  = props['date:Date Range:start'] || null;
  const end    = props['date:Date Range:end']   || null;
  const des = typeof props['Design Days']   === 'number' ? Math.round(props['Design Days'])   : 0;
  const dra = typeof props['Drafting Days'] === 'number' ? Math.round(props['Drafting Days']) : 0;
  const quo = typeof props['Quoting Days']  === 'number' ? Math.round(props['Quoting Days'])  : 0;
  const rel = props['Tasks'] || props['Task'] || props['Actions'] || [];
  const hex = (row.id||'').replace(/-/g,'');

  // Milestones: read each deliverable's date (blank if not scheduled), keep only set ones
  const milestones = MILESTONE_DEFS
    .map(m => ({ label: m.label, short: m.short, date: (props['date:' + m.key + ':start'] || '').substring(0,10) || null }))
    .filter(m => m.date)
    .sort((a,b) => a.date.localeCompare(b.date));

  return {
    id: row.id,
    name: row.title || props['Name'] || 'Untitled',
    status,
    done:     /done|complet|finish/i.test(status),
    archived: /archiv/i.test(status),
    upcoming: /upcoming/i.test(status),
    waiting:  /waiting|feedback|hold/i.test(status),
    stage,
    phase2:   /phase\s*2|execution/i.test(stage),   // blank/Phase 1 → Phase 1 by default
    start, end,
    lastEdited: props['Last edited time'] || '',
    designDays: des, draftingDays: dra, quotingDays: quo,
    wds: des + dra + quo,
    _wdsLoaded: (des + dra + quo) > 0,
    taskCount: Array.isArray(rel) ? rel.length : 0,
    url: 'https://www.notion.so/' + hex,
    cr: 0,
    milestones,
    _tasks: null
  };
}

// Delivery date = latest scheduled milestone; next = first milestone still ahead.
function deliveryInfo(p){
  const ms = p.milestones || [];
  if(!ms.length) return { delivery: null, next: null, daysToNext: null, allDone: false };
  const delivery = ms[ms.length - 1].date;
  const next = ms.find(m => m.date >= TODAY_STR) || null;
  return {
    delivery,
    next,
    daysToNext: next ? daysBetween(TODAY_STR, new Date(next.date + 'T00:00:00')) : null,
    allDone: !next
  };
}

// Full delivery-schedule section for the detail view ('' when no schedule exists)
function scheduleSection(p){
  const ms = (p.milestones || []);
  if(!ms.length) return '';
  const di = deliveryInfo(p);

  // Timeline range: earliest of project start / first milestone → delivery date
  const startAnchor = [p.start, ms[0].date].filter(Boolean).sort()[0];
  const endAnchor   = di.delivery;
  const t0 = new Date(startAnchor + 'T00:00:00').getTime();
  const t1 = new Date(endAnchor   + 'T00:00:00').getTime();
  const span = Math.max(1, t1 - t0);
  const pct = ds => Math.max(0, Math.min(100, (new Date(ds + 'T00:00:00').getTime() - t0) / span * 100));

  const nextDate = di.next ? di.next.date : null;
  const dots = ms.map(m => {
    const state = m.date < TODAY_STR ? 'done' : (m.date === nextDate ? 'next' : 'future');
    return `<div class="ms-dot ${state}" style="left:${pct(m.date)}%">
      <span class="ms-dot-lbl">${esc(m.short)}</span>
      <span class="ms-dot-date">${fmtDate(m.date)}</span>
    </div>`;
  }).join('');
  const progressPct = di.allDone ? 100 : (nextDate ? pct(nextDate) : 0);
  const todayMarker = (TODAY_STR >= startAnchor && TODAY_STR <= endAnchor)
    ? `<div class="ms-today" style="left:${pct(TODAY_STR)}%"></div>` : '';

  const list = ms.map(m => {
    const done = m.date < TODAY_STR;
    const isNext = m.date === nextDate;
    const col = done ? '#4ade80' : isNext ? '#fbbf24' : '#3f3f46';
    const tag = done
      ? `<span class="ms-item-tag" style="background:rgba(74,222,128,.1);color:#4ade80">&#10003; Delivered</span>`
      : isNext
        ? `<span class="ms-item-tag" style="background:rgba(217,119,6,.15);color:#fbbf24">Next up</span>`
        : `<span class="ms-item-tag" style="background:#1a1a1a;color:#737373">Upcoming</span>`;
    return `<div class="ms-item ${isNext?'next-item':''}">
      <span class="ms-item-icon" style="background:${col}"></span>
      <span class="ms-item-name">${esc(m.label)}</span>
      <span class="ms-item-date">${fmtDate(m.date)}</span>
      ${tag}
    </div>`;
  }).join('');

  const nextLine = di.allDone
    ? `<span style="color:#4ade80">&#10003; All deliverables met</span>`
    : `Next: <span style="color:#fbbf24;font-weight:700">${esc(di.next.label)}</span> ${fmtDate(di.next.date)}` +
      (di.daysToNext === 0 ? ' · today' : di.daysToNext === 1 ? ' · tomorrow' : ` · in ${di.daysToNext} days`);

  return `
  <div class="d-section-lbl">Delivery Schedule</div>
  <div class="ms-deliver-banner">
    <div><div class="dl-lbl">Client Delivery</div><div class="dl-date">${fmtDate(di.delivery)}</div></div>
    <div class="dl-next">${nextLine}</div>
  </div>
  <div class="ms-track">
    <div class="ms-progress" style="width:${progressPct}%"></div>
    ${todayMarker}
    ${dots}
  </div>
  <div class="ms-list">${list}</div>
  <div style="height:24px"></div>`;
}

// Compact milestone line for a hub project row ('' when no schedule exists)
function milestoneRowLine(p){
  const di = deliveryInfo(p);
  if(!di.delivery) return '';
  let nextTxt;
  if(di.allDone){
    nextTxt = `<span style="color:#4ade80">&#10003; All deliverables met</span>`;
  } else {
    const d = di.daysToNext;
    const when = d === 0 ? 'today' : d === 1 ? 'tomorrow' : `in ${d} days`;
    const col  = d <= 3 ? '#fbbf24' : '#e4e4e7';
    nextTxt = `<span style="color:#737373">Next:</span> <span style="color:${col};font-weight:700">${esc(di.next.label)}</span> <span style="color:#737373">${fmtDate(di.next.date)} · ${when}</span>`;
  }
  return `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:9.5px;font-weight:600;margin:2px 0 6px">
    <span style="color:#a78bfa">&#9873;</span>${nextTxt}
    <span style="color:#2a2a2a">&middot;</span>
    <span style="color:#737373">Delivery</span> <span style="color:#c4b5fd;font-weight:700">${fmtDate(di.delivery)}</span>
  </div>`;
}

async function refreshFromNotion(){
  if(_refreshing) return;
  // Old app builds (before Jul 2026) lack the database-query bridge — the UI
  // auto-updates but main.js only changes with a reinstall.
  if(!window.tl || typeof window.tl.queryDatabase !== 'function'){
    setConn('offline', 'This app version is too old for the new dashboard. Please reinstall using the latest "TL Design Team Setup" (run BUILD.bat / ask Harold for the new installer).');
    return;
  }
  _refreshing = true;
  setConn('sync');
  const btn = document.getElementById('refresh-btn');
  if(btn) btn.textContent = '⟳ Syncing…';
  try{
    const rows = await window.tl.queryDatabase(PROJECTS_DB_ID);
    const mapped = rows.map(mapProject).filter(p => !p.archived);

    // keep old _tasks (detail-view task lists) when the project persists
    for(const np of mapped){
      const old = PROJECTS.find(x => x.id === np.id);
      if(old && old._tasks) np._tasks = old._tasks;
    }

    // completed projects: resolve completion date, keep only recent ones
    for(const p of mapped){
      if(p.done) p.completion = completionDate(p.end, p.lastEdited);
    }
    const cutoff = new Date(TODAY); cutoff.setDate(cutoff.getDate() - DONE_WINDOW_DAYS);
    const cutoffStr = cutoff.toISOString().slice(0,10);

    PROJECTS = mapped.filter(p => {
      if(p.done) return (p.completion >= cutoffStr) && (p.wds > 0 || p.start);
      if(p.upcoming) return true;
      return true; // active
    });
    // sort: active by start date, oldest first
    PROJECTS.sort((a,b) => String(a.start||'9999').localeCompare(String(b.start||'9999')));

    _lastSync = new Date();
    saveCache();
    renderAll();
    setConn('live');
    snapshotCurrentMonth();
    if(_currentTab === 'history') loadHistoryView();
  }catch(e){
    console.warn('[TL] Notion refresh failed:', e.message);
    setConn('offline', e.message || 'Connection failed');
    if(PROJECTS.length === 0){
      document.getElementById('projects-el').innerHTML =
        `<div style="color:#f87171;font-size:12px;padding:14px;background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.25);border-radius:8px;font-weight:600">
          Could not load projects from Notion.<br>
          <span style="color:#b45050;font-weight:500;font-size:11px">${esc(e.message||'')} — check your token (&#9881; top right) and your internet connection.</span>
        </div>`;
      document.getElementById('ring-el').innerHTML = '<div class="ring-wrap"><svg viewBox="0 0 210 210"><circle class="ring-track" cx="105" cy="105" r="95"/></svg><div class="ring-center"><div class="score-num" style="color:#3f3f46">—</div><div class="score-sub">No data</div></div></div>';
    }
  }finally{
    _refreshing = false;
    if(btn) btn.innerHTML = '&#8635; Refresh';
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//  SCORING
// ═══════════════════════════════════════════════════════════════════════════
function projectScore(elapsed, cr){
  let s;
  if (elapsed <= D_DESIGN)   s = 100 - Math.round((elapsed / D_DESIGN) * 15);
  else if (elapsed <= D_STD) s = 85  - Math.round(((elapsed - D_DESIGN) / (D_STD - D_DESIGN)) * 20);
  else                       s = Math.max(10, 65 - Math.round((elapsed - D_STD) * 1.0));
  s -= cr * 10;
  return Math.max(5, Math.min(100, s));
}
function scoreState(s){ return s >= 80 ? 'great' : s >= 60 ? 'good' : s >= 40 ? 'fair' : 'poor'; }

function projDays(p){ return p._wdsLoaded ? (p.wds||0) : (p.start ? daysBetween(p.start, TODAY) : 0); }

function getMonthlyDone(){
  const m = TODAY.getMonth(), y = TODAY.getFullYear();
  return PROJECTS.filter(p => {
    if(!p.done || !p.completion) return false;
    const d = new Date(p.completion + 'T00:00:00');
    return d.getMonth() === m && d.getFullYear() === y;
  });
}

function calcScoreFromProjects(){
  const active  = PROJECTS.filter(p => !p.done && !p.upcoming);
  const monthly = getMonthlyDone();
  const overdue = active.filter(p => projDays(p) > D_STD).length;
  const onTime  = active.length - overdue;
  const totalCR = active.reduce((s,p) => s + (p.cr||0), 0);

  let score = 60;
  score += Math.min(15, Math.round((onTime / (active.length||1)) * 15));
  score += Math.min(10, monthly.length * 5);
  score -= overdue * 7;
  score -= totalCR * 5;
  score  = Math.max(0, Math.min(100, score));
  return { score, active: active.length, inProg: onTime, overdue, doneMonth: monthly.length };
}

//  HUB RENDERING
// ═══════════════════════════════════════════════════════════════════════════
function renderScore(score, data){
  const state = score >= 80 ? 'great' : score >= 60 ? 'good' : score >= 40 ? 'fair' : 'behind';
  const label = { great:'Performing Well', good:'On Track', fair:'Needs Attention', behind:'Behind' }[state];
  document.body.className = state;

  const CIRC = 597;
  const offset = CIRC - (CIRC * score / 100);

  document.getElementById('ring-el').innerHTML = `
    <div class="ring-wrap">
      <svg viewBox="0 0 210 210">
        <circle class="ring-track" cx="105" cy="105" r="95"/>
        <circle class="ring-fill" id="rfill" cx="105" cy="105" r="95" style="stroke-dashoffset:${CIRC}"/>
      </svg>
      <div class="ring-center">
        <div class="score-num" id="snum">0</div>
        <div class="score-sub">Team Score</div>
      </div>
    </div>`;

  requestAnimationFrame(() => {
    const f = document.getElementById('rfill');
    f.style.transition = 'stroke-dashoffset 1.6s cubic-bezier(.4,0,.2,1), stroke .3s';
    f.style.strokeDashoffset = offset;
  });

  const el = document.getElementById('snum');
  const start = performance.now();
  (function tick(now){
    const p = Math.min((now - start) / 1400, 1), ease = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(ease * score);
    if(p < 1) requestAnimationFrame(tick); else el.textContent = score;
  })(start);

  document.getElementById('pill-el').innerHTML =
    `<div class="status-pill"><span class="pulse-dot"></span>${label}</div>`;

  const monthName = MONTHS_SHORT[TODAY.getMonth()];
  document.getElementById('kpis-el').innerHTML =
    kpi(data.active, 'Active', '') +
    '<div class="kpi-sep"></div>' +
    kpi(data.inProg, 'On Time', 'purple') +
    '<div class="kpi-sep"></div>' +
    kpi(data.doneMonth, 'Done in ' + monthName, '') +
    '<div class="kpi-sep"></div>' +
    kpi(data.overdue, 'Overdue', data.overdue > 0 ? 'red' : '');

  // This month's completions
  const monthlyDone = getMonthlyDone().slice().sort((a,b)=>String(a.completion).localeCompare(String(b.completion)));
  const monthFull = MONTHS_FULL[TODAY.getMonth()].toUpperCase();
  let mHtml = `<div class="monthly-header"><span class="monthly-month-label">${monthFull}</span></div><div class="monthly-items">`;
  if(monthlyDone.length === 0){
    mHtml += `<div class="monthly-empty">No projects completed this month yet</div>`;
  } else {
    monthlyDone.forEach(p => {
      mHtml += `<div class="monthly-item" onclick="window.tl.openExternal('${p.url}')" style="cursor:pointer">
        <div class="monthly-item-name">${esc(p.name)}</div>
        <div class="monthly-item-right">
          <div class="monthly-item-date">${fmtDate(p.completion)}</div>
          <div class="monthly-done-chip">DONE</div>
        </div>
      </div>`;
    });
  }
  mHtml += '</div>';
  document.getElementById('monthly-el').innerHTML = mHtml;
}

function kpi(n, l, cls){
  return `<div class="kpi"><div class="kpi-n ${cls}">${n}</div><div class="kpi-l">${l}</div></div>`;
}

function phaseBadgeFor(p, phase){
  if(p.done)  return `<span class="pbadge done-badge">&#10003; Completed</span>`;
  if(phase === 'drafting') return `<span class="pbadge drafting">Drafting</span>`;
  if(phase === 'quote' || phase === 'over') return `<span class="pbadge quoting">Quoting</span>`;
  return `<span class="pbadge design">Design</span>`;
}

function buildProjectRow(p, isDone){
  const nameArg = esc(p.name).replace(/'/g, "\\'");

  if(p.upcoming){
    return `
<div class="proj-row upcoming-row">
  <div class="proj-top" style="margin-bottom:0">
    <div style="display:flex;flex-direction:column;gap:4px;min-width:0;flex:1">
      <div class="proj-name">${esc(p.name)}</div>
      <div class="proj-badges"><span class="pbadge neutral">Upcoming</span>${p.start ? `<span class="pbadge neutral">Starts ${fmtDate(p.start)}</span>` : ''}</div>
    </div>
  </div>
</div>`;
  }

  if(isDone){
    const totalDays = p.wds || (p.start && p.completion ? workingDays(p.start, p.completion) : 0);
    const score  = projectScore(totalDays || 1, p.cr);
    return `
<div class="proj-row done-row" onclick="showDetail('${nameArg}')">
  <div class="proj-top">
    <div style="display:flex;flex-direction:column;gap:4px;min-width:0;flex:1">
      <div class="proj-name">${esc(p.name)}</div>
      <div class="proj-badges">
        <span class="pbadge done-badge">&#10003; Completed ${fmtDate(p.completion)}</span>
        <span class="pbadge neutral">${totalDays}d working</span>
        ${p.cr > 0 ? `<span class="pbadge cr">${p.cr} revision${p.cr>1?'s':''}</span>` : ''}
      </div>
    </div>
    <div class="proj-score done-score"><div class="ps-num">${score}</div><div class="ps-lbl">final</div></div>
  </div>
  <div class="tbar-track">
    <div style="position:absolute;inset:0;background:linear-gradient(90deg,rgba(74,222,128,.25),rgba(74,222,128,.45));border-radius:999px"></div>
  </div>
  <div class="proj-bottom" style="margin-top:8px">
    <div class="proj-day-info">Started ${p.start||'—'} &middot; ${p.taskCount} tasks</div>
    <div style="font-size:9.5px;color:${totalDays <= D_STD ? '#4ade80' : '#f87171'};font-weight:600">${totalDays <= D_STD ? 'On time' : '+' + (totalDays - D_STD) + 'd over standard'}</div>
  </div>
</div>`;
  }

  // ── Active project row ──
  const calDays = p.start ? Math.max(0, daysBetween(p.start, TODAY)) : 0;
  const hasReal = p._wdsLoaded === true;
  const elapsed = hasReal ? Math.round(p.wds) : calDays;
  const dDesign = p.designDays || 0, dDraft = p.draftingDays || 0, dQuote = p.quotingDays || 0;

  let phase, over, dW, drW, qW, oW, todayPct;
  if(hasReal){
    const totalWds = dDesign + dDraft + dQuote;
    const overWds  = Math.max(0, totalWds - D_STD);
    const WINDOW   = Math.max(D_STD * 1.5, totalWds + 10);
    dW = dDesign / WINDOW * 100; drW = dDraft / WINDOW * 100; qW = dQuote / WINDOW * 100;
    oW = overWds / WINDOW * 100;
    todayPct = Math.min(totalWds / WINDOW * 100, 98);
    over = overWds;
    phase = dQuote > 0 ? (overWds > 0 ? 'over' : 'quote') : dDraft > 0 ? 'drafting' : 'design';
  } else {
    phase = elapsed <= D_DESIGN ? 'design' : elapsed <= (D_DESIGN + D_DRAW) ? 'drafting' : elapsed <= D_STD ? 'quote' : 'over';
    over  = Math.max(0, elapsed - D_STD);
    const WINDOW = Math.max(D_STD * 1.5, elapsed + 10);
    dW  = Math.min(D_DESIGN, elapsed) / WINDOW * 100;
    drW = elapsed > D_DESIGN ? Math.min(D_DRAW, elapsed - D_DESIGN) / WINDOW * 100 : 0;
    qW  = elapsed > (D_DESIGN + D_DRAW) ? Math.min(D_QUOTE, elapsed - D_DESIGN - D_DRAW) / WINDOW * 100 : 0;
    oW  = phase === 'over' ? (elapsed - D_STD) / WINDOW * 100 : 0;
    todayPct = Math.min(elapsed / WINDOW * 100, 98);
  }

  const rowCls = over > 0 ? 'over' : (p.waiting ? 'risk' : 'ok');

  const badges = [];
  badges.push(phaseBadgeFor(p, phase));
  if(p.waiting) badges.push(`<span class="pbadge waiting">&#8987; Waiting for feedback</span>`);
  if(p.cr > 0)  badges.push(`<span class="pbadge cr">&#9888; ${p.cr} revision${p.cr>1?'s':''}</span>`);
  badges.push(over > 0
    ? `<span class="pbadge over">+${over}d over</span>`
    : `<span class="pbadge ontime">On time</span>`);

  const score  = projectScore(elapsed, p.cr);
  const sState = scoreState(score);

  const dot = `<span style="color:#2a2a2a;margin:0 4px">&middot;</span>`;
  const phaseParts = [];
  if(hasReal){
    phaseParts.push(`<span style="color:#a78bfa">Design&nbsp;${dDesign}d</span>`);
    if(dDraft > 0) phaseParts.push(`<span style="color:#67e8f9">Drafting&nbsp;${dDraft}d</span>`);
    if(dQuote > 0) phaseParts.push(`<span style="color:#fbbf24">Quoting&nbsp;${dQuote}d</span>`);
    if(over > 0)   phaseParts.push(`<span style="color:#f87171">Over&nbsp;+${over}d</span>`);
  } else {
    phaseParts.push(`<span style="color:#737373">No phase data yet</span>`);
  }

  return `
<div class="proj-row ${rowCls}" onclick="showDetail('${nameArg}')">
  <div class="proj-top">
    <div style="display:flex;flex-direction:column;gap:4px;min-width:0;flex:1">
      <div class="proj-name">${esc(p.name)}</div>
      <div class="proj-badges">${badges.join('')}</div>
    </div>
    <div class="proj-score ${sState}"><div class="ps-num">${score}</div><div class="ps-lbl">score</div></div>
  </div>
  <div class="tbar-track">
    <div class="tbar-design"   style="width:${dW}%"></div>
    <div class="tbar-drafting" style="left:${dW}%;width:${drW}%"></div>
    <div class="tbar-quote"    style="left:${dW+drW}%;width:${qW}%"></div>
    <div class="tbar-over"     style="left:${dW+drW+qW}%;width:${oW}%"></div>
    <div class="tbar-today"    style="left:${todayPct}%"></div>
  </div>
  <div style="font-size:9.5px;font-weight:600;margin:4px 0 6px;letter-spacing:.01em">${phaseParts.join(dot)}</div>
  ${milestoneRowLine(p)}
  <div class="proj-bottom">
    <div class="proj-day-info">
      ${hasReal
        ? `<span style="color:#e4e4e7;font-weight:700">${elapsed}d working</span><span style="color:#525252">&nbsp;&middot;&nbsp;${calDays}d calendar</span>`
        : `<span style="color:#737373">${calDays}d calendar</span>`}
      &nbsp;&middot;&nbsp;${p.taskCount} tasks
    </div>
  </div>
</div>`;
}

function toggleSection(which){

  const arrow = document.getElementById(which + '-arrow');

function renderAll(){
  const active   = PROJECTS.filter(p => !p.done && !p.upcoming);
  const upcoming = PROJECTS.filter(p => p.upcoming);
  const done     = PROJECTS.filter(p => p.done).sort((a,b)=>String(b.completion).localeCompare(String(a.completion)));

  // legend (driven by constants so it can never drift from the real standards)
  document.getElementById('bar-legend').innerHTML =
    `<div class="leg-item"><div class="leg-swatch design"></div><div class="leg-text">Design <span>${D_DESIGN} days</span></div></div>` +
    `<div class="leg-item"><div class="leg-swatch drafting"></div><div class="leg-text">Drafting <span>+${D_DRAW} days</span></div></div>` +
    `<div class="leg-item"><div class="leg-swatch quote"></div><div class="leg-text">Quote <span>+${D_QUOTE} days</span></div></div>` +
    `<div class="leg-item"><div class="leg-swatch over"></div><div class="leg-text">Over standard <span>&gt;${D_STD} days</span></div></div>`;

  // Split active projects by Stage: Phase 1 (Design) vs Phase 2 (Execution).
  // Blank/"Phase 1 - Design" → Phase 1; only explicit "Phase 2 - Execution" → Phase 2.
  const phase1 = active.filter(p => !p.phase2);
  const phase2 = active.filter(p =>  p.phase2);
  const groupHdr = (cls, title, sub, n) =>
    `<div class="phase-group-hdr ${cls}"><span class="phase-group-dot"></span>` +
    `<span class="phase-group-title">${title}</span><span class="phase-group-sub">${sub}</span>` +
    `<span class="line"></span><span class="phase-group-count">${n}</span></div>`;
  let activeHtml = '';
  if(!active.length){
    activeHtml = '<div style="color:#525252;font-size:12px;padding:10px 0">No active projects</div>';
  } else {
    // If every active project is Phase 1, don't bother with group headers.
    if(phase2.length === 0){
      activeHtml = phase1.map(p => buildProjectRow(p, false)).join('');
    } else {
      if(phase1.length) activeHtml += groupHdr('p1', 'Phase 1', 'Design', phase1.length) + phase1.map(p => buildProjectRow(p, false)).join('');
      if(phase2.length) activeHtml += groupHdr('p2', 'Phase 2', 'Execution', phase2.length) + phase2.map(p => buildProjectRow(p, false)).join('');
    }
  }
  document.getElementById('projects-el').innerHTML = activeHtml;

  const upT = document.getElementById('upcoming-toggle');
  if(upcoming.length){ upT.style.display = 'flex'; document.getElementById('upcoming-list').innerHTML = upcoming.map(p => buildProjectRow(p, false)).join(''); }
  else upT.style.display = 'none';

  const doT = document.getElementById('completed-toggle');
  if(done.length){ doT.style.display = 'flex'; document.getElementById('completed-list').innerHTML = done.map(p => buildProjectRow(p, true)).join(''); }
  else doT.style.display = 'none';

  // average banner — uses working days when loaded
  const banner = document.getElementById('avg-banner');
  if(active.length){
    banner.style.display = 'flex';
    const days = active.map(projDays);
    const avgDays = Math.round(days.reduce((a,b)=>a+b,0) / days.length);
    const overAvg = avgDays - D_STD;
    const onTrack = active.filter(p => projDays(p) <= D_STD).length;
    banner.innerHTML =
      `<div class="avg-stat"><div class="avg-num" style="color:${overAvg>0?'#f87171':'#4ade80'}">${avgDays}d</div><div class="avg-lbl">Avg working days</div></div>` +
      `<div class="avg-sep"></div>` +
      `<div class="avg-stat"><div class="avg-num" style="color:#a1a1aa">${D_STD}d</div><div class="avg-lbl">Standard timeline</div></div>` +
      `<div class="avg-sep"></div>` +
      `<div class="avg-stat"><div class="avg-num" style="color:${overAvg>0?'#f87171':'#4ade80'}">${overAvg>0?'+':''}${overAvg}d</div><div class="avg-lbl">Vs standard</div></div>` +
      `<div class="avg-sep"></div>` +
      `<div class="avg-stat"><div class="avg-num" style="color:#4ade80">${onTrack}</div><div class="avg-lbl">On schedule</div></div>` +
      `<div class="avg-sep"></div>` +
      `<div class="avg-stat"><div class="avg-num" style="color:${active.length-onTrack>0?'#f87171':'#4ade80'}">${active.length-onTrack}</div><div class="avg-lbl">Over timeline</div></div>` +
      `<div class="avg-note">${active.length} active projects &middot; Standard: Design ${D_DESIGN}d + Drafting ${D_DRAW}d + Quote ${D_QUOTE}d = ${D_STD}d</div>`;
  } else banner.style.display = 'none';

  renderUpcomingDeliverables();

  const data = calcScoreFromProjects();
  renderScore(data.score, data);
}

// Hub-wide "what's due next": next upcoming milestone per non-done project, soonest first
function renderUpcomingDeliverables(){
  const el = document.getElementById('upcoming-deliverables-el');
  const rows = PROJECTS
    .filter(p => !p.done)
    .map(p => ({ p, di: deliveryInfo(p) }))
    .filter(x => x.di.next)
    .sort((a,b) => a.di.next.date.localeCompare(b.di.next.date));

  if(!rows.length){ el.innerHTML = ''; return; }

  el.innerHTML = `<div class="upcoming-deliverables">
    <div class="ud-title">&#9873; Upcoming Deliverables</div>
    ${rows.map(({p, di}) => {
      const d = di.daysToNext;
      const when = d === 0 ? 'today' : d === 1 ? 'tomorrow' : `${d} days`;
      const col  = d <= 3 ? '#fbbf24' : d <= 10 ? '#c4b5fd' : '#737373';
      return `<div class="ud-item" onclick="showDetail('${esc(p.name).replace(/'/g,"\\'")}')" style="cursor:pointer">
        <span class="ud-proj">${esc(p.name)}</span>
        <span class="ud-ms">${esc(di.next.label)}</span>
        <span class="ud-when" style="color:${col}">${fmtDate(di.next.date)} · ${when}</span>

    }).join('')}
  </div>`;
}

function showHub(){
  document.getElementById('tab-bar').style.display = 'flex';
  document.getElementById('detail-view').style.display = 'none';
  if(_currentTab === 'history'){
    document.getElementById('hub-view').style.display = 'none';

  } else {
    document.getElementById('hub-view').style.display = '';
    document.getElementById('history-view').style.display = 'none';

function showTab(tab){
  _currentTab = tab;
  const hubEl = document.getElementById('hub-view');
  const histEl = document.getElementById('history-view');
  document.getElementById('tab-hub').classList.toggle('tab-active', tab === 'hub');
  document.getElementById('tab-history').classList.toggle('tab-active', tab === 'history');

  else { hubEl.style.display = 'none'; histEl.style.display = 'block'; loadHistoryView(); }

async function showDetail(name){
  if(!name) return;
  const n = name.replace(/\\'/g, "'");
  const p = PROJECTS.find(x => x.name === n);
  if(!p) return;

  document.getElementById('hub-view').style.display = 'none';
  document.getElementById('history-view').style.display = 'none';
  document.getElementById('tab-bar').style.display = 'none';
  const dv = document.getElementById('detail-view');
  dv.style.display = 'block';
  dv.innerHTML = renderDetail(p);

  // refresh task-level data in the background
  if(p.id){
    const loadBar = document.createElement('div');
    loadBar.id = 'detail-load-bar';
    loadBar.style.cssText = 'position:fixed;top:0;left:0;height:2px;width:0%;background:linear-gradient(90deg,#7c3aed,#8b5cf6);transition:width .3s;z-index:99';
    dv.prepend(loadBar);
    const setBar = pct => { if(loadBar.isConnected) loadBar.style.width = pct + '%'; };

    try{
      setBar(10);
      const { props } = await window.tl.fetchPage(p.id);
      const taskUrls = Array.isArray(props['Tasks']) ? props['Tasks'] : Array.isArray(props['Task']) ? props['Task'] : Array.isArray(props['Actions']) ? props['Actions'] : [];
      setBar(20);

      let totalDes = 0, totalDra = 0, totalQuo = 0;
      const freshTasks = [];
      for(let ti = 0; ti < taskUrls.length; ti++){
        if(!dv.isConnected || dv.style.display === 'none') return;
        const tid = urlToId(taskUrls[ti]);
        if(!tid) continue;
        try{
          const { props: tp, title } = await window.tl.fetchPage(tid);
          const phase  = (tp['Phase'] || '').toUpperCase();
          const tStart = tp['date:Action Date:start'] || tp['date:Date:start'] || tp['date:Timeline:start'] || tp['date:Work Date:start'] || tp['date:Deadline:start'];
          const tEnd   = tp['date:Action Date:end']   || tp['date:Date:end']   || tp['date:Timeline:end']   || tp['date:Work Date:end']   || tp['date:Deadline:end'];
          let tDays = 0;
          if(tStart && tEnd) tDays = workingDays(tStart.substring(0,10), tEnd.substring(0,10));
          if(phase.includes('DESIGN'))     totalDes += tDays;
          else if(phase.includes('DRAFT')) totalDra += tDays;
          else if(phase.includes('QUOT'))  totalQuo += tDays;
          freshTasks.push({ name: title || tp['Name'] || 'Untitled', phase, status: tp['Status'] || '', start: tStart, end: tEnd, days: tDays });
        }catch(e){}
        setBar(20 + Math.round((ti + 1) / taskUrls.length * 70));
        if(ti < taskUrls.length - 1) await sleep(60);
      }

      // only overwrite rollup numbers if the per-task sums found anything
      if(totalDes + totalDra + totalQuo > 0 && !p._wdsLoaded){
        p.designDays = totalDes; p.draftingDays = totalDra; p.quotingDays = totalQuo;
        p.wds = totalDes + totalDra + totalQuo; p._wdsLoaded = true;
      }
      p._tasks = freshTasks;
      saveCache();
      setBar(100);
      if(dv.isConnected && dv.style.display !== 'none') dv.innerHTML = renderDetail(p);
    }catch(e){ if(loadBar.isConnected) loadBar.remove(); }
  }
}

function renderDetail(p){
  const isDone  = !!p.done;
  const calDays = p.start ? Math.max(0, daysBetween(p.start, isDone && p.completion ? new Date(p.completion + 'T00:00:00') : TODAY)) : 0;
  const des = p.designDays || 0, dra = p.draftingDays || 0, quo = p.quotingDays || 0;
  const totalWds = des + dra + quo;
  const overWds  = Math.max(0, totalWds - D_STD);
  const score    = projectScore(totalWds || calDays || 1, p.cr);
  const sState   = scoreState(score);

  const phase = quo > 0 ? (overWds > 0 ? 'over' : 'quote') : dra > 0 ? 'drafting' : 'design';
  const badges = [phaseBadgeFor(p, phase)];
  if(p.waiting) badges.push(`<span class="pbadge waiting">&#8987; Waiting for feedback</span>`);
  if(p.cr > 0)  badges.push(`<span class="pbadge cr">&#9888; ${p.cr} revision${p.cr>1?'s':''}</span>`);
  badges.push(isDone
    ? `<span class="pbadge done-badge">Done ${fmtDate(p.completion)}</span>`
    : overWds > 0 ? `<span class="pbadge over">+${overWds}d over</span>` : `<span class="pbadge ontime">On time</span>`);
  badges.push(`<span class="pbadge neutral">Started ${p.start || '—'}</span>`);

  const WINDOW = Math.max(D_STD * 1.5, totalWds + 10);
  const dW = des / WINDOW * 100, drW = dra / WINDOW * 100, qW = quo / WINDOW * 100, oW = overWds / WINDOW * 100;
  const todayPct = Math.min(totalWds / WINDOW * 100, 98);
  const stdPct = D_STD / WINDOW * 100;

  function phaseBar(label, actual, target, color, gradStart, gradEnd){
    const overD = Math.max(0, actual - target);
    const span  = target * 1.8;
    const fPct  = Math.min(actual, target) / span * 100;
    const oPct  = overD / span * 100;
    const tPct  = target / span * 100;
    const overLabel = overD > 0 ? `<span style="color:#f87171;margin-left:6px">+${overD}d over target</span>` : '';
    return `
<div class="phase-detail-row">
  <div class="phase-detail-label">
    <span class="phase-detail-name" style="color:${color}">${label}</span>
    <span class="phase-detail-info">${actual}d actual${overLabel} &middot; ${target}d standard</span>
  </div>
  <div class="phase-detail-track">
    <div class="phase-detail-fill" style="width:${fPct}%;background:linear-gradient(90deg,${gradStart},${gradEnd})"></div>
    ${overD > 0 ? `<div class="phase-detail-over" style="left:${fPct}%;width:${Math.min(oPct, 100-fPct)}%"></div>` : ''}
    <div class="phase-detail-target" style="left:${tPct}%"></div>
  </div>
</div>`;
  }

  const tasks = (p._tasks || []).slice().sort((a,b) => {
    const order = { DESIGN:0, DRAFTING:1, QUOTING:2 };
    return (order[a.phase] ?? 3) - (order[b.phase] ?? 3);
  });
  const taskRows = tasks.map(t => {
    const chipStyle = t.phase === 'DESIGN'
      ? `background:rgba(139,92,246,.2);color:#a78bfa;border:1px solid rgba(139,92,246,.3)`
      : t.phase === 'DRAFTING'
        ? `background:rgba(8,145,178,.2);color:#67e8f9;border:1px solid rgba(8,145,178,.35)`
        : t.phase === 'QUOTING'
          ? `background:rgba(217,119,6,.2);color:#fbbf24;border:1px solid rgba(217,119,6,.3)`
          : `background:#1a1a1a;color:#737373;border:1px solid #2a2a2a`;
    const stLow = (t.status || '').toLowerCase();
    const isDoneTask = stLow.includes('done') || stLow.includes('complet') || stLow.includes('cancel');
    const statusStyle = isDoneTask
      ? 'background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.2)'
      : 'background:rgba(217,119,6,.1);color:#fbbf24;border:1px solid rgba(217,119,6,.2)';
    return `<div class="task-item">
  <span class="task-phase-chip" style="${chipStyle}">${t.phase || '&mdash;'}</span>
  <span class="task-item-name">${esc(t.name)}</span>
  <span class="task-item-days">${t.days > 0 ? t.days + 'd' : t.start ? '&mdash;' : ''}</span>
  <span class="task-item-status" style="${statusStyle}">${isDoneTask ? '&#10003; Done' : '&#9679; Active'}</span>
</div>`;
  }).join('');

  return `
<div class="detail-header">
  <button class="back-btn" onclick="showHub()">&#8592; Back</button>
  <div class="detail-name">${esc(p.name)}</div>
  <button class="notion-link" onclick="window.tl.openExternal('${p.url}')">Open in Notion &#8599;</button>
</div>
<div class="detail-body">

  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px">${badges.join('')}</div>

  <div class="dstat-row">
    <div class="dstat"><div class="dstat-n" style="color:#a78bfa">${des}d</div><div class="dstat-l">Design</div></div>
    <div class="dstat"><div class="dstat-n" style="color:#67e8f9">${dra}d</div><div class="dstat-l">Drafting</div></div>
    <div class="dstat"><div class="dstat-n" style="color:#fbbf24">${quo}d</div><div class="dstat-l">Quoting</div></div>
    <div class="dstat"><div class="dstat-n" style="color:#e4e4e7">${totalWds}d</div><div class="dstat-l">Working days</div></div>
    <div class="dstat"><div class="dstat-n" style="color:#737373">${calDays}d</div><div class="dstat-l">Calendar days</div></div>
    <div class="dstat"><div class="dstat-n" style="color:${sState==='great'?'#a78bfa':sState==='good'?'#4ade80':sState==='fair'?'#fbbf24':'#f87171'}">${score}</div><div class="dstat-l">Score</div></div>
  </div>

  ${scheduleSection(p)}

  <div class="d-section-lbl">Working Time — Phase Timeline</div>
  <div class="big-tbar-track" style="margin-bottom:6px">
    <div class="tbar-design"   style="width:${dW}%"></div>
    <div class="tbar-drafting" style="left:${dW}%;width:${drW}%"></div>
    <div class="tbar-quote"    style="left:${dW+drW}%;width:${qW}%"></div>
    <div class="tbar-over"     style="left:${dW+drW+qW}%;width:${oW}%"></div>
    <div class="tbar-today"    style="left:${todayPct}%"></div>
  </div>
  <div style="position:relative;height:14px;margin-bottom:24px">
    <div style="position:absolute;left:${stdPct}%;transform:translateX(-50%);font-size:8.5px;color:#3f3f46;white-space:nowrap">&#9650; ${D_STD}d standard</div>
  </div>

  <div class="d-section-lbl">Per-Phase Breakdown</div>
  ${phaseBar('Design',   des, D_DESIGN, '#a78bfa', '#7c3aed', '#8b5cf6')}
  ${dra > 0 || !isDone ? phaseBar('Drafting', dra, D_DRAW,  '#67e8f9', '#0e7490', '#0891b2') : ''}
  ${quo > 0 || !isDone ? phaseBar('Quoting',  quo, D_QUOTE, '#fbbf24', '#b45309', '#d97706') : ''}

  ${tasks.length > 0 ? `
  <div class="d-section-lbl" style="margin-top:24px">Tasks (${tasks.length})</div>
  ${taskRows}` : `<div style="color:#3f3f46;font-size:11px;margin-top:20px">Loading task details&hellip;</div>`}

</div>`;
}

function monthKey(y, m){ return 'tl-monthly-' + y + '-' + String(m + 1).padStart(2, '0'); }

function getAllSnapshotKeys(){
  const keys = [];
  try{ for(let i = 0; i < localStorage.length; i++){ const k = localStorage.key(i); if(k && k.startsWith('tl-monthly-')) keys.push(k); } }catch(e){}
  return keys.sort();
}

// Every successful sync updates the CURRENT month's snapshot (final:false).
// When the month rolls over, the last saved state becomes that month's locked record.
function snapshotCurrentMonth(){
  try{
    const key = monthKey(TODAY.getFullYear(), TODAY.getMonth());
    const existing = JSON.parse(localStorage.getItem(key) || 'null');
    if(existing && existing.final) return; // never touch a locked month

    const monthly = getMonthlyDone();
    const sData   = calcScoreFromProjects();
    const active  = PROJECTS.filter(p => !p.done && !p.upcoming);
    const snap = {
      savedAt: TODAY_STR,
      final: false,
      standards: { design: D_DESIGN, draft: D_DRAW, quote: D_QUOTE },
      score: sData.score,
      activeCount: sData.active,
      completedThisMonthCount: monthly.length,
      overdue: sData.overdue,
      totalDesignDays:   active.reduce((s,p)=>s+(p.designDays||0),0),
      totalDraftingDays: active.reduce((s,p)=>s+(p.draftingDays||0),0),
      totalQuotingDays:  active.reduce((s,p)=>s+(p.quotingDays||0),0),
      projects: PROJECTS.filter(p=>!p.upcoming).map(p => ({
        name: p.name, done: !!p.done, start: p.start, end: p.done ? p.completion : null,
        designDays: p.designDays||0, draftingDays: p.draftingDays||0,
        quotingDays: p.quotingDays||0, wds: p.wds||0, cr: p.cr||0
      })),
      completedThisMonth: monthly.map(p => ({ name: p.name, end: p.completion }))
    };
    localStorage.setItem(key, JSON.stringify(snap));
  }catch(e){}
}

// Lock any snapshot from a past month
function finalizePastMonths(){
  try{
    const cur = monthKey(TODAY.getFullYear(), TODAY.getMonth());
    for(const key of getAllSnapshotKeys()){
      if(key >= cur) continue;
      const snap = JSON.parse(localStorage.getItem(key) || 'null');
      if(snap && !snap.final){ snap.final = true; localStorage.setItem(key, JSON.stringify(snap)); }
    }
  }catch(e){}
}

//  HISTORY VIEW
// ═══════════════════════════════════════════════════════════════════════════
let _histKeys = [], _histIdx = 0, _histChart = null, _trendCharts = [];

function loadHistoryView(){
  _histKeys = getAllSnapshotKeys();
  if(_histKeys.length === 0){
    document.getElementById('hist-trend').innerHTML = '';
    document.getElementById('month-chips').innerHTML = '';
    document.getElementById('hist-content').innerHTML = `
      <div class="hist-empty">
        <div class="hist-empty-icon">&#128196;</div>
        <div class="hist-empty-text">No monthly data yet.<br><br>A snapshot of the current month is saved automatically every time the dashboard syncs with Notion, and locks when the month ends.</div>
      </div>`;
    document.getElementById('hist-month-label').textContent = '—';
    document.getElementById('hist-prev').disabled = true;
    document.getElementById('hist-next').disabled = true;
    return;
  }
  _histIdx = _histKeys.length - 1;
  renderTrend();
  renderMonthChips();
  renderHistoryForIndex(_histIdx);
}

function snapFor(key){
  try{ return JSON.parse(localStorage.getItem(key)); }catch(e){ return null; }
}
function keyLabel(key, short){
  const parts = key.replace('tl-monthly-','').split('-');
  const y = parseInt(parts[0]), m = parseInt(parts[1]) - 1;
  return (short ? MONTHS_SHORT[m] : MONTHS_FULL[m]) + ' ' + (short ? String(y).slice(2) : y);
}
function isLiveKey(key){
  return key === monthKey(TODAY.getFullYear(), TODAY.getMonth());
}

function renderMonthChips(){
  const el = document.getElementById('month-chips');
  el.innerHTML = _histKeys.map((k, i) =>
    `<button class="month-chip ${i === _histIdx ? 'active' : ''}" onclick="jumpToMonth(${i})">${isLiveKey(k) ? '<span class="mc-live"></span>' : ''}${keyLabel(k, true)}</button>`
  ).join('');
  const act = el.querySelector('.month-chip.active');
  if(act) act.scrollIntoView({ inline: 'center', block: 'nearest' });
}

function jumpToMonth(i){ _histIdx = i; renderMonthChips(); renderHistoryForIndex(i); }
function navigateMonth(dir){
  const ni = _histIdx + dir;
  if(ni < 0 || ni >= _histKeys.length) return;
  jumpToMonth(ni);
}

// Multi-month trend: score line + completions columns (two charts, one time axis)
function renderTrend(){
  const el = document.getElementById('hist-trend');
  _trendCharts.forEach(c => c.destroy()); _trendCharts = [];
  if(_histKeys.length < 2){ el.innerHTML = ''; return; }
  const snaps  = _histKeys.map(snapFor);
  const labels = _histKeys.map(k => keyLabel(k, true));

  el.innerHTML = `
    <div class="trend-wrap">
      <div class="trend-title">Team Score Trend</div>
      <div style="position:relative;height:130px"><canvas id="trend-score"></canvas></div>
      <div class="trend-title" style="margin-top:16px">Projects Completed per Month</div>
      <div style="position:relative;height:90px"><canvas id="trend-done"></canvas></div>
    </div>`;

  if(typeof Chart === 'undefined') return;
  const axisTicks = { color:'#71717a', font:{ size:10 } };
  const hairline  = { color:'rgba(255,255,255,.05)' };

  _trendCharts.push(new Chart(document.getElementById('trend-score'), {
    type: 'line',
    data: { labels, datasets: [{
      data: snaps.map(s => s?.score ?? null),

    }]},

      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display:false }, tooltip: { callbacks: { label: c => ' Score: ' + c.raw } } },

function deltaChip(label, cur, prev, goodWhenUp){
  if(prev === null || prev === undefined || cur === null || cur === undefined) return '';
  const d = cur - prev;
  const cls = d === 0 ? 'dc-flat' : (d > 0) === goodWhenUp ? 'dc-up' : 'dc-down';
  const arrow = d > 0 ? '&#9650;' : d < 0 ? '&#9660;' : '&#8213;';
  return `<div class="delta-chip"><span class="dc-lbl">${label}</span><span class="dc-val ${cls}">${arrow} ${d > 0 ? '+' : ''}${d}</span></div>`;
}

function renderHistoryForIndex(idx){
  const key = _histKeys[idx];
  document.getElementById('hist-prev').disabled = idx <= 0;
  document.getElementById('hist-next').disabled = idx >= _histKeys.length - 1;
  const snap = snapFor(key);
  if(!snap){
    document.getElementById('hist-content').innerHTML = '<div style="color:#525252;padding:20px">Could not load snapshot.</div>';
    return;
  }
  document.getElementById('hist-month-label').textContent = keyLabel(key, false);
  const prev = idx > 0 ? snapFor(_histKeys[idx - 1]) : null;
  renderHistoryMonth(snap, prev, isLiveKey(key));
}

function renderHistoryMonth(snap, prev, live){
  if(_histChart){ _histChart.destroy(); _histChart = null; }

  const std = snap.standards || { design: 35, draft: 14, quote: 10 };
  const stdTotal = std.design + std.draft + std.quote;

  const CIRC = 239; // 2πr, r=38
  const scoreOffset = CIRC - (CIRC * snap.score / 100);
  const state = snap.score >= 80 ? 'great' : snap.score >= 60 ? 'good' : snap.score >= 40 ? 'fair' : 'behind';
  const scoreColor = { great:'#a78bfa', good:'#4ade80', fair:'#fbbf24', behind:'#f87171' }[state];
  const ringColor  = { great:'#7c3aed', good:'#16a34a', fair:'#d97706', behind:'#dc2626' }[state];

  const deltas = prev ? `<div class="delta-chips">
      ${deltaChip('Score vs ' + '' + keyLabel(_histKeys[_histIdx-1] || '', true), snap.score, prev.score, true)}
      ${deltaChip('Completed', snap.completedThisMonthCount || 0, prev.completedThisMonthCount || 0, true)}
      ${deltaChip('Overdue', snap.overdue, prev.overdue, false)}
      ${deltaChip('Active', snap.activeCount, prev.activeCount, true)}
    </div>` : '';

  const completedHtml = (snap.completedThisMonth || []).map(p => `
    <div class="hist-completed-item">
      <div class="hist-completed-name">${esc(p.name)}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:10px;color:#737373;font-weight:600">${fmtDate(p.end)}</span>
        <span class="hchip" style="background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.2)">&#10003; Done</span>
      </div>
    </div>`).join('');

  const activeProjs = (snap.projects || []).filter(p => !p.done);
  const chartH = Math.max(140, activeProjs.length * 40 + 60);

  const projRows = (snap.projects || []).map(p => {
    const tot = (p.designDays||0) + (p.draftingDays||0) + (p.quotingDays||0);
    const chips = [];
    if(p.designDays   > 0) chips.push(`<span class="hchip" style="background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.25)">Design ${p.designDays}d</span>`);
    if(p.draftingDays > 0) chips.push(`<span class="hchip" style="background:rgba(8,145,178,.15);color:#67e8f9;border:1px solid rgba(8,145,178,.3)">Drafting ${p.draftingDays}d</span>`);
    if(p.quotingDays  > 0) chips.push(`<span class="hchip" style="background:rgba(217,119,6,.15);color:#fbbf24;border:1px solid rgba(217,119,6,.25)">Quoting ${p.quotingDays}d</span>`);
    chips.push(p.done
      ? `<span class="hchip" style="background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.2)">&#10003; Done${p.end ? ' ' + fmtDate(p.end) : ''}</span>`
      : tot > stdTotal
        ? `<span class="hchip" style="background:rgba(220,38,38,.15);color:#f87171;border:1px solid rgba(220,38,38,.25)">+${tot - stdTotal}d over</span>`
        : `<span class="hchip" style="background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.2)">On time</span>`);
    return `<div class="hist-proj-row">
      <div class="hist-proj-name">${esc(p.name)}</div>
      <div class="hist-proj-phases">${chips.join('')}</div>
    </div>`;
  }).join('');

  const statusBadge = live
    ? `<span class="hist-live-badge">&#9679; In progress — updates as the month goes</span>`
    : `<span class="hist-lock-badge">&#128274; Locked ${snap.savedAt || ''}</span>`;

  document.getElementById('hist-content').innerHTML = `
    ${deltas}
    <div class="hist-score-section">
      <div class="hist-ring-wrap">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle fill="none" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round" cx="50" cy="50" r="38"/>
          <circle fill="none" stroke="${ringColor}" stroke-width="10" stroke-linecap="round" cx="50" cy="50" r="38"
            stroke-dasharray="${CIRC}" stroke-dashoffset="${scoreOffset}"
            style="transform:rotate(-90deg);transform-origin:50px 50px;transition:stroke-dashoffset 1.2s ease"/>
        </svg>
        <div class="hist-ring-center">
          <div class="hist-score-num" style="color:${scoreColor}">${snap.score}</div>
          <div class="hist-score-lbl">Score</div>
        </div>
      </div>
      <div class="hist-kpis">
        <div class="hist-kpi"><div class="hist-kpi-n">${snap.activeCount}</div><div class="hist-kpi-l">Active</div></div>
        <div class="hist-kpi-sep"></div>
        <div class="hist-kpi"><div class="hist-kpi-n" style="color:#4ade80">${snap.completedThisMonthCount || 0}</div><div class="hist-kpi-l">Completed</div></div>
        <div class="hist-kpi-sep"></div>
        <div class="hist-kpi"><div class="hist-kpi-n" style="color:${snap.overdue > 0 ? '#f87171' : '#a1a1aa'}">${snap.overdue}</div><div class="hist-kpi-l">Overdue</div></div>
        <div class="hist-kpi-sep"></div>
        <div class="hist-kpi"><div class="hist-kpi-n" style="color:#a78bfa">${snap.totalDesignDays}</div><div class="hist-kpi-l">Design d</div></div>
        <div class="hist-kpi-sep"></div>
        <div class="hist-kpi"><div class="hist-kpi-n" style="color:#67e8f9">${snap.totalDraftingDays}</div><div class="hist-kpi-l">Drafting d</div></div>
        <div class="hist-kpi-sep"></div>
        <div class="hist-kpi"><div class="hist-kpi-n" style="color:#fbbf24">${snap.totalQuotingDays}</div><div class="hist-kpi-l">Quoting d</div></div>
      </div>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap">
      <div class="hist-section-lbl" style="margin-bottom:0;flex:1">Working Days by Phase — Active Projects</div>
      ${statusBadge}
    </div>
    <div class="hist-chart-wrap">
      <div style="position:relative;height:${chartH}px">
        <canvas id="hist-bar-chart"></canvas>
      </div>
      <div style="font-size:9px;color:#3f3f46;margin-top:6px">Standard that applied: Design ${std.design}d + Drafting ${std.draft}d + Quote ${std.quote}d = ${stdTotal}d</div>
    </div>

    ${(snap.completedThisMonth || []).length > 0 ? `<div class="hist-section-lbl">Completed This Month</div>${completedHtml}` : ''}

    <div class="hist-section-lbl" style="margin-top:${(snap.completedThisMonth || []).length > 0 ? 20 : 0}px">All Projects</div>
    ${projRows}
  `;

  requestAnimationFrame(() => {
    const ctx = document.getElementById('hist-bar-chart');
    if(!ctx || typeof Chart === 'undefined') return;
    const withData = activeProjs.filter(p => (p.designDays||0) + (p.draftingDays||0) + (p.quotingDays||0) > 0);
    if(withData.length === 0) return;
    const segment = { borderColor: SURFACE, borderWidth: 2, borderRadius: 3, borderSkipped: false, barThickness: 16 };
    _histChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: withData.map(p => p.name),
        datasets: [
          { label:'Design',   data: withData.map(p => p.designDays  || 0), backgroundColor: C_DESIGN, ...segment },
          { label:'Drafting', data: withData.map(p => p.draftingDays|| 0), backgroundColor: C_DRAFT,  ...segment },
          { label:'Quoting',  data: withData.map(p => p.quotingDays || 0), backgroundColor: C_QUOTE,  ...segment }
        ]
      },
      options: {
        indexAxis: 'y',
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display:true, position:'bottom', labels: { color:'#a1a1aa', font:{ size:10, weight:'700' }, boxWidth:10, boxHeight:10, padding:14 } },
          tooltip: { callbacks: { label: c => ` ${c.dataset.label}: ${c.raw}d` } }
        },
        scales: {
          x: { stacked:true, grid:{ color:'rgba(255,255,255,.04)' }, ticks:{ color:'#71717a', font:{ size:10 } },
               title:{ display:true, text:'Working days', color:'#525252', font:{ size:10 } } },
          y: { stacked:true, grid:{ display:false }, ticks:{ color:'#a1a1aa', font:{ size:10, weight:'600' } } }
        }
      }
    });
  });
}

// ═══════════════════════════════════════════════════════════════════════════
//  TOKEN ENTRY
// ═══════════════════════════════════════════════════════════════════════════
function enterToken(){
  const current = document.getElementById('token-input-bar');
  if(current){ current.remove(); return; }
  const bar = document.createElement('div');
  bar.id = 'token-input-bar';
  bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid #2a2a2a;padding:12px 20px;display:flex;gap:10px;align-items:center;z-index:9999';
  bar.innerHTML = `
    <input id="tbar-input" type="password" placeholder="Paste your ntn_... (or secret_...) token here"
      style="flex:1;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:7px;padding:9px 13px;color:#fff;font-size:13px;font-family:monospace;outline:none"
      onkeydown="if(event.key==='Enter')saveToken()">
    <button onclick="saveToken()" style="background:#7c3aed;border:none;border-radius:7px;padding:9px 18px;color:#fff;font-size:13px;font-weight:700;cursor:pointer">Save</button>
    <button onclick="document.getElementById('token-input-bar').remove()" style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:7px;padding:9px 14px;color:#a1a1aa;font-size:13px;cursor:pointer">✕</button>
  `;
  document.body.appendChild(bar);
  setTimeout(() => document.getElementById('tbar-input').focus(), 50);
}

async function saveToken(){
  const input = document.getElementById('tbar-input');
  if(!input) return;
  const token = (input.value || '').trim().replace(/^secret_(?=ntn_)/, '');
  if(!(token.startsWith('secret_') || token.startsWith('ntn_'))){ input.style.borderColor = '#f87171'; return; }
  input.style.borderColor = '#4ade80';
  await window.tl.setToken(token);
  document.getElementById('token-input-bar').remove();
  refreshFromNotion();
}

// ═══════════════════════════════════════════════════════════════════════════
//  BOOT — render cached data instantly, then refresh from Notion
// ═══════════════════════════════════════════════════════════════════════════
(function boot(){
  const D = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dateStr = D[TODAY.getDay()] + ', ' + MONTHS_FULL[TODAY.getMonth()] + ' ' + TODAY.getDate() + ', ' + TODAY.getFullYear();
  document.getElementById('date-line').textContent = dateStr;
  const side = document.getElementById('date-line-side');
  side.textContent = dateStr;

  OLD_CACHE_KEYS.forEach(k => { try{ localStorage.removeItem(k); }catch(e){} });
  seedHistoricalSnapshots();
  finalizePastMonths();

  const cached = loadCache();
  if(cached && Array.isArray(cached.projects) && cached.projects.length){
    PROJECTS = cached.projects;
    renderAll();
  }
  refreshFromNotion();
  setInterval(() => { if(!document.hidden) refreshFromNotion(); }, REFRESH_EVERY_MS);
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" crossorigin="anonymous"></script>
